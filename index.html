<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever in Our Hearts 💖</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600..700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Particles Container -->
    <div id="particles-container"></div>
    <div class="glow-bg"></div>

    <!-- MAIN PAGE (Landing) -->
    <section id="landing-page" class="page active">
        <div class="hero">
            <div class="badge-2k26">✨ CLASS OF 2K26 ✨</div>
            <h1 class="hero-title">Forever in Our Hearts 💖</h1>
            <p class="hero-subtitle">Memories fade, but the moments stay with us forever...</p>

            <!-- CTA Action -->
            <div class="cta-container">
                <button id="go-to-game-btn" class="glowing-btn">
                    <span>Go to Farewell Game 🎮</span>
                </button>
            </div>
        </div>

        <!-- Memories Section -->
        <div class="memories-section glass-panel">
            <h2 class="section-title">Precious Memories ✨</h2>
            <div class="memories-grid">
                <!-- Memory Cards -->
                <div class="memory-card">
                    <img src="b975dab3-9a9d-4b9e-9a5e-cdd57b4acb7f.jpg" alt="Graduation Day">
                </div>
                <div class="memory-card">
                    <img src="20260323_205541.png" alt="Fest">
                </div>
                <div class="memory-card">
                    <img src="IMG_1125.png" alt="Library">
                </div>
                <div class="memory-card">
                    <img src="IMG-20260201-WA0016.jpg" alt="Friends">
                </div>
                <div class="memory-card">
                    <img src="20260131_165816.png" alt="Friends">
                </div>
                <div class="memory-card">
                    <img src="IMG_2353(ggg).png" alt="Friends">
                </div>
            </div>
        </div>
        <!-- ECE Department Farewell Section -->
        <div class="ece-farewell-container">
            <!-- Top Wave -->
            <div class="ece-wave">
                <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                    <path
                        d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V0Z"
                        class="wave-shape"></path>
                </svg>
            </div>

            <div class="ece-farewell-section fade-in-section">
                <!-- Floating Elements -->
                <div class="parallax-bg" id="parallax-bg"></div>
                <div class="floating-icons">
                    <span class="float-icon icon-1">⚡</span>
                    <span class="float-icon icon-2">💖</span>
                    <span class="float-icon icon-3">✨</span>
                    <span class="float-icon icon-4">📡</span>
                    <span class="float-icon icon-5">🌟</span>
                </div>

                <div class="ece-content glass-panel">
                    <h2 class="ece-title">Electronics & Communication</h2>
                    <h3 class="ece-subtitle">Jyothi Engineering College (2022–2026)</h3>
                    <div class="text-container">
                        <p class="ece-text typing-text" id="ece-typing-text"></p>
                    </div>
                </div>
            </div>

            <!-- Bottom Wave -->
            <div class="ece-wave wave-bottom">
                <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
                    <path
                        d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V120Z"
                        class="wave-shape"></path>
                </svg>
            </div>
        </div>



    </section>

    <!-- GAME PAGE -->
    <section id="game-page" class="page hidden">
        <button id="back-btn" class="glass-btn">🔙 Back to Memories</button>
        <button id="top10-btn" class="glass-btn float-right">Top 10 🌟</button>

        <div class="game-header">
            <h1 class="hero-title" id="main-question-display">Who is the Ultimate Senior? 👑</h1>
        </div>

        <div class="search-container glass-panel">
            <input type="text" id="search-bar" placeholder="🔍 Search for a senior...">
            <ul id="autocomplete-list" class="hidden"></ul>
        </div>

        <div class="student-grid" id="student-grid">
            <!-- Student cards generated by JS -->
        </div>
    </section>

    <!-- TOP 10 MODAL -->
    <div id="top10-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <button id="close-modal" class="close-btn">✖</button>
            <h2 class="section-title">🌟 Hall of Fame 🌟</h2>
            <div id="ranking-list" class="ranking-list">
                <!-- Rankings generated by JS -->
            </div>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bg-music" loop autoplay>
        <source src="A Farewell Melody __ Original by Jacob's Piano - Jacob's Piano.mp3" type="audio/mpeg">
    </audio>
    <button id="music-btn" class="floating-btn music-btn" title="Toggle Music">🎵</button>

    <!-- Firebase SDK (v8 Compat) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Canvas Confetti CDN -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
